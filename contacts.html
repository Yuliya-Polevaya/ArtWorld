<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/kontakt.css">
    <title>ArtWorld ~Контакты~</title>
</head>
<body>
    <div class="back">
            <a class="back_btn" href="main.html" title="<Назад"><Назад</a>
    </div>

    <!-- Основной блок контактов -->
    <section class="info-section">

        <h1 class="main-title">Контакты</h1>

        <!-- Форма обратной связи -->
        <div class="info contact-card">
            <h3>Напишите нам:</h3>

            <form>
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Email</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="exampleFormControlInput1" 
                        placeholder="artworld_official@mail.ru"
                    >
                </div>

                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label"> Ваш Email</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="exampleFormControlInput1" 
                        placeholder="artworld_official@mail.ru"
                    >
                </div>

                <div class="mb-3">
                    <label for="exampleFormControlTextarea1" class="form-label">Сообщение</label>
                    <textarea 
                        class="form-control" 
                        id="exampleFormControlTextarea1" 
                        rows="5" 
                        placeholder="Ваше сообщение..."
                    ></textarea>
                </div>

                <button type="submit" class="iksweb">Отправить</button>
            </form>
        </div>

        <div class="info">
            <!-- Подписка на новые картины -->
            <h3>Подписка на новые картины</h3>

            <form>
                <!-- Имя -->
                <div class="mb-3">
                    <label class="form-label">Ваше имя</label>
                    <input type="text" class="form-control" placeholder="Введите имя">
                </div>

                <!-- Телефон -->
                <div class="mb-3">
                    <label class="form-label">Номер телефона</label>
                    <input type="number" class="form-control" placeholder="+7...">
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="example@mail.com">
                </div>

                <!-- Как часто получать уведомления -->
                <div class="mb-3">
                    <label class="form-label">Как часто присылать обновления?</label><br>

                    <input type="radio" name="freq"> Раз в неделю<br>
                    <input type="radio" name="freq"> Раз в месяц<br>
                    <input type="radio" name="freq"> Только важное<br>
                </div>

                <!-- Интересы -->
                <div class="mb-3">
                    <label class="form-label">Что вам интересно?</label>
                    <select class="form-control">
                        <option>Известные картины</option>
                        <option>Современное искусство</option>
                        <option>Художники</option>
                        <option>Музеи</option>
                    </select>
                </div>

                <!-- Checkbox -->
                <div class="mb-3">
                    <input type="checkbox">
                    <label>Согласен получать рассылку</label>
                </div>

                <button type="submit" class="iksweb">Подписаться</button>

            </form>
        </div>

        <!-- Информация -->
        <div class="info">
            <h3>Адрес:</h3>
            <p>г. Москва, ул. Искусств, д. 10</p>
        </div>

        <div class="info">
            <h3>Телефон:</h3>
            <p>+7 (900) 888-77-77</p>
        </div>

        <div class="info">
            <h3>Email:</h3>
            <p>artworld_official@mail.ru</p>
        </div>

        <div class="info">
            <h3>Социальные сети:</h3>
            <p>
                <a href="#">Telegram</a> |
                <a href="#">VK</a> |
                <a href="#">Max</a>
            </p>
        </div>

    </section>

    
    
</body>
</html>
