<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtWorld ~Регистрация~</title>
    <!-- bootstrap -->
    <link rel="stylesheet" href="css/bootstrap/bootstrap-grid.min.css">

    <link rel="stylesheet" href="css/wallpaper.css">
</head>
<body>
    <div class="wallpaper">
        <img src="img/wall.jpg" alt="" srcset="">

        <div class="back">
            <a class="back_btn" href="main.html" title="<Назад"><Назад</a>
        </div>

        <div class="registrat">
            <a class="registrat_btn" href="registrat.html" title="Регистрация">Регистрация</a>
        </div>

        <div class="entrance">
            <a class="entrance_btn" href="entrance.html" title="Вход">Вход</a>
        </div>
        
        <div class="center_block">
            <h2>Регистрация</h2>

            <form action="/submit" method="post">
                <label for="name">Придумайте имя:</label>
                <br><br>
                <input type="text" id="name" name="name" required>
                <br><br>

                <label for="email">Введите свою почту:</label>
                <br><br>
                <input type="email" id="email" name="email" placeholder="email@mail.ru">
                <br><br>

                <div class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="inputPassword6" class="col-form-label">Придумайте пароль</label>
                </div>
                <div class="col-auto">
                    <input type="password" id="inputPassword6" class="form-control" aria-describedby="passwordHelpInline">
                </div>
                <div class="col-auto">
                    <span id="passwordHelpInline" class="form-text">
                        Длина должна составлять от 8 до 20 символов.
                    </span>
                </div>
                </div>

                <div class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="inputPassword6" class="col-form-label">Повтарите пароль</label>
                </div>
                <div class="col-auto">
                    <input type="password" id="inputPassword6" class="form-control" aria-describedby="passwordHelpInline">
                </div>
                </div>

                <button type="submit" class="btn btn-primary">Зарегестрироваться</button>
            </form>
        </div>
    </div>


    <!-- JS -->
    <script src="js/js.js"></script>
    <!-- bootstrap -->
    <script src="js/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
