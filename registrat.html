<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/wallpaper.css">
</head>
<body>
    <div class="wallpaper">
        <img src="img/wall.jpg" alt="" srcset="">

        <div class="back">
            <a class="back_btn" href="main.html" title="<Назад"><Назад</a>
        </div>

        <div class="registrat">
            <a class="registrat_btn" href="registrat.html" title="Регистрация">Регистрация</a>
        </div>

        <div class="entrance">
            <a class="entrance_btn" href="entrance.html" title="Вход">Вход</a>
        </div>
        
        <div class="center_block">
            <h2>Регистрация</h2>

            <form action="/submit" method="post">
                <label for="name">Придумайте имя:</label>
                <br><br>
                <input type="text" id="name" name="name" required>
                <br><br>

                <label for="email">Введите свою почту:</label>
                <br><br>
                <input type="email" id="email" name="email" placeholder="email@mail.ru">
                <br><br>


                <label for="password">Придумайте пароль:</label>
                <br><br>
                <input type="password" id="password" name="password" required>
                <br><br>

                <label for="password">Повторите пароль:</label>
                <br><br>
                <input type="password" id="password" name="password" required>
                <br><br>

                <div class="send">
                    <a class="send_btn" href="#" title="Отправить">Отправить</a>
                </div>
            </form>
        </div>
    </div>


    <!-- JS -->
    <script src="js/js.js"></script>
</body>
</html>
