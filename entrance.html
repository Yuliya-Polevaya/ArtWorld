<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtWorld ~Вход~</title>
    <!-- bootstrap -->
    <link rel="stylesheet" href="css/bootstrap/bootstrap-grid.min.css">

    <link rel="stylesheet" href="css/wallpaper.css">
</head>
<body>
    <div class="wallpaper">
        <img src="img/wall.jpg" alt="" srcset="">  
        
        <div class="back">
            <a class="back_btn" href="main.html" title="<Назад"><Назад</a>
        </div>

        <div class="registrat">
            <a class="registrat_btn" href="registrat.html" title="Регистрация">Регистрация</a>
        </div>

        <div class="entrance">
            <a class="entrance_btn" href="entrance.html" title="Вход">Вход</a>
        </div>

        <div class="center_block">
            <h2 id="vxd">Вход</h2>

            <form>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Введите свою почту</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                    <div id="emailHelp" class="form-text">Можете ввести либо свою почту, либо свое имя</div>
                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Введите пароль</label>
                    <input type="password" class="form-control" id="exampleInputPassword1">
                </div>
                <button type="submit" class="btn btn-primary">Вход</button>
            </form>
        </div>
    </div>

    <!-- JS -->
    <script src="js/js.js"></script>
    <!-- bootstrap -->
    <script src="js/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
